# =============================================================================
# Publications — single source of truth.
# Rendered on /publications/ (grouped by year, newest first) and, when
# `selected: true`, on the home page.
#
# Fields per entry:
#   key       unique id (also the HTML anchor, e.g. /publications/#key)
#   title     paper title
#   authors   author list as HTML; wrap your own name in <strong>…</strong>
#   venue     conference/journal name (shown in italics)
#   abbr      short venue badge shown on the left (optional)
#   year      integer; used to group & sort
#   note      short note after the venue, e.g. "To appear" (optional)
#   selected  true to also feature it on the home page (optional)
#   award     award badge text (optional)
#   links     ordered map of "Button label: URL". Local files use site-absolute
#             paths like /assets/pdf/foo.pdf. Add "Slides" for the slide deck and
#             "Presentation" for the talk video (e.g. a YouTube link).
#   bibtex    full BibTeX, shown under a collapsible "BibTeX" toggle (optional)
# =============================================================================

